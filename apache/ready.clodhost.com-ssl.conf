<VirtualHost *:443>
    ServerName ready.clodhost.com
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/ready.clodhost.com.crt
    SSLCertificateKeyFile /etc/ssl/private/ready.clodhost.com.key

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ready.clodhost.com-error.log
    CustomLog ${APACHE_LOG_DIR}/ready.clodhost.com-access.log combined
</VirtualHost>
